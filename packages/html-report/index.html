<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coverage report · Covallaby</title>
    <script>
      // Apply the theme before first paint to avoid a flash.
      const saved = localStorage.getItem("covallaby-theme");
      const dark = saved ? saved === "dark" : matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.classList.toggle("dark", dark);
    </script>
  </head>
  <body>
    <script id="covallaby-data" type="application/json">__COVALLABY_DATA__</script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
