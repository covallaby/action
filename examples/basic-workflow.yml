# The whole Covallaby setup: run your tests with coverage, then one step.
name: Tests

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write # lets Covallaby post its sticky comment

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: Coverage report
        uses: covallaby/covallaby/packages/github-action@main
        with:
          files: coverage/lcov.info
          min-patch: 85
