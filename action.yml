name: Covallaby
description: Beautiful coverage reports for your pull requests.
author: Covallaby
branding:
  icon: check-circle
  color: green

inputs:
  files:
    description: Coverage files, newline- or comma-separated (e.g. coverage/lcov.info). Optional for artifact-only Playwright or Storybook uploads.
    required: false
  format:
    description: "Coverage format (default: auto-detect). Supported: lcov, jacoco, cobertura, xccov."
    required: false
  ignore:
    description: Paths to exclude from coverage, newline- or comma-separated gitignore-style globs (e.g. "**/*.gen.ts", "node_modules", "tests/**").
    required: false
  strip-prefix:
    description: Path prefix to strip so file paths are repo-relative. Defaults to the workspace directory.
    required: false
  min-project:
    description: Minimum project line coverage percent (0-100).
    required: false
  min-patch:
    description: Minimum coverage percent of the lines changed in this PR (0-100).
    required: false
  min-new-file:
    description: Minimum coverage percent for each file added in this PR (0-100).
    required: false
  comment:
    description: "'update' (default) posts and updates one sticky PR comment; 'off' disables commenting."
    required: false
    default: update
  check:
    description: "Create a rich 'Covallaby' entry in the Checks tab with the full report and annotations (needs the `checks: write` permission). Default true."
    required: false
    default: "true"
  breakdown:
    description: "Directory rollup in the report: 'auto' (default, picks a depth that stays readable), a fixed depth number, or 'off'."
    required: false
    default: auto
  annotations:
    description: "Annotate uncovered changed lines in the PR diff (max 10). Default true."
    required: false
    default: "true"
  statuses:
    description: "Create covallaby/project and covallaby/patch commit statuses (needs the `statuses: write` permission). Default true."
    required: false
    default: "true"
  github-token:
    description: Token used to read the PR diff and post the sticky comment.
    required: false
    default: ${{ github.token }}
  server-url:
    description: Covallaby server URL. When paired with server-token, coverage is stored in the hosted dashboard and visual artifacts are uploaded.
    required: false
  server-token:
    description: Per-repository or admin upload token for the Covallaby server.
    required: false
  playwright-results:
    description: Playwright JSON reporter output. Enables browser-run playback uploads.
    required: false
  playwright-artifacts:
    description: Additional Playwright files or directories to upload, comma- or newline-separated.
    required: false
  storybook-dir:
    description: Built Storybook directory (usually storybook-static). Captures every indexed story and publishes the interactive build.
    required: false
  component-captures:
    description: Directory of pre-rendered component PNGs from Phoenix Storybook, Lost Pixel, or another visual test runner.
    required: false
  storybook-capture:
    description: "Per-story image capture: 'auto' (default, capture when Chrome is available), 'required', or 'off'."
    required: false
    default: auto

outputs:
  project-coverage:
    description: Project line coverage percent (one decimal), or empty if no coverable lines.
  patch-coverage:
    description: Patch line coverage percent (one decimal), or empty outside PRs / for docs-only changes.
  uncovered-lines:
    description: Number of uncovered lines in the project.
  ok:
    description: "'true' when every configured threshold passed."
  playback-url:
    description: Hosted URL for the uploaded Playwright browser run, or empty when disabled.
  storybook-url:
    description: Hosted URL for the uploaded Storybook preview, or empty when disabled.

runs:
  using: node24
  main: packages/github-action/dist/index.cjs
