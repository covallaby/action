name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: CI + coverage gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write # covallaby/project + covallaby/patch named checks
      checks: write # the rich "Covallaby" Checks-tab entry
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      # Build first: typecheck resolves workspace deps via their dist output.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:coverage

      - name: Action bundle is up to date
        run: git diff --exit-code packages/github-action/dist

      # Dogfood: Covallaby reports on Covallaby.
      - name: Coverage report
        uses: ./packages/github-action
        with:
          files: coverage/lcov.info
          min-project: 75
          min-patch: 80

      - name: HTML report
        run: node packages/cli/dist/bin.js html coverage/lcov.info --strip-prefix "$PWD" -o covallaby-report

      - name: Coverage badge
        run: node packages/cli/dist/bin.js badge coverage/lcov.info --strip-prefix "$PWD" -o covallaby-report/coverage-badge.svg

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: covallaby-report
          path: covallaby-report
