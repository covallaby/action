name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Lint, build, test
    runs-on: ubuntu-latest
    permissions:
      contents: write # to refresh the committed coverage badge on main
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      # Build first: typecheck resolves workspace deps via their dist output.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:coverage

      - name: Action bundle is up to date
        run: git diff --exit-code packages/github-action/dist

      # Dogfood: Covallaby reports on Covallaby.
      - name: Coverage report
        uses: ./packages/github-action
        with:
          files: coverage/lcov.info
          min-project: 75
          min-patch: 80

      - name: HTML report
        run: node packages/cli/dist/bin.js html coverage/lcov.info --strip-prefix "$PWD" -o covallaby-report

      - name: Coverage badge
        run: node packages/cli/dist/bin.js badge coverage/lcov.info --strip-prefix "$PWD" -o covallaby-report/coverage-badge.svg

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: covallaby-report
          path: covallaby-report

      # The README renders this badge; only commit when the number changed.
      - name: Refresh committed badge
        if: github.ref == 'refs/heads/main'
        run: |
          cp covallaby-report/coverage-badge.svg docs/coverage-badge.svg
          if ! git diff --quiet docs/coverage-badge.svg; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/coverage-badge.svg
            git commit -m "Update coverage badge [skip ci]"
            git push
          fi

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: covallaby-report

  # Publishes the live report at https://covallaby.github.io/covallaby/ —
  # GitHub Pages needs the repo to be public (or a paid plan), so this job
  # is non-blocking until then.
  pages:
    if: github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
